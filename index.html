*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 60px;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(212,169,106,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(74,222,128,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ─── LAYOUT ─── */
.app {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 480px;
  padding: 0 16px;
  box-sizing: border-box;
}

/* ─── PAGES ─── */
.page { display: none; animation: fadeUp 0.4s ease; }
.page.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── HEADER ─── */
.page-header {
  text-align: center;
  padding: 56px 0 36px;
}

.logo-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(212,169,106,0.1);
  border: 1px solid rgba(212,169,106,0.18);
  border-radius: 30px;
  padding: 5px 14px 5px 10px;
  margin-bottom: 22px;
}

.logo-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent-warm);
  box-shadow: 0 0 8px rgba(212,169,106,0.7);
  animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.6; transform: scale(0.85); }
}

.logo-badge span {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: var(--accent-warm);
  text-transform: uppercase;
}

.page-title {
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--accent);
  margin-bottom: 10px;
}
.page-title--input   { font-size: clamp(40px, 10vw, 52px); }
.page-title--results { font-size: clamp(34px, 9vw,  46px); }

/* ─── CARD ─── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 16px;
  margin-bottom: 14px;
}

/* ─── FIELDS ─── */
.field {
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.field:first-child { padding-top: 0; }
.field:last-child  { border-bottom: none; padding-bottom: 0; }

/* Shared label style */
.field-label,
.result-label,
.section-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--text-sub);
}
.field-label   { margin-bottom: 8px; }
.section-label { color: var(--text-muted); text-align: center; margin-bottom: 10px; letter-spacing: 0.12em; }

.field-input {
  width: 100%;
  max-width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  font-family: var(--font-body);
  font-size: 17px;
  color: var(--text);
  outline: none;
  text-align: center;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.field-input::placeholder { color: var(--text-muted); }
.field-input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
}
.field-input.error { border-color: var(--red); }

/* Hide number spinners */
.field-input::-webkit-outer-spin-button,
.field-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.field-input[type=number] { -moz-appearance: textfield; }

/* ─── DISTANCE TOGGLE ─── */
.toggle-group { display: flex; gap: 8px; }

.toggle-btn {
  flex: 1;
  padding: 13px;
  border-radius: var(--radius-sm);
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.toggle-btn.active-short {
  background: rgba(74,222,128,0.1);
  border-color: rgba(74,222,128,0.35);
  color: var(--green);
}
.toggle-btn.active-long {
  background: rgba(212,169,106,0.1);
  border-color: rgba(212,169,106,0.35);
  color: var(--accent-warm);
}

/* ─── BUTTONS ─── */
.submit-btn,
.back-btn {
  width: 100%;
  padding: 16px;
  border-radius: var(--radius-sm);
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 6px;
  -webkit-tap-highlight-color: transparent;
}

.submit-btn {
  background: var(--accent);
  border: none;
  color: #0a0a0f;
  letter-spacing: 0.01em;
  transition: opacity 0.2s, transform 0.1s;
}
.submit-btn:active { opacity: 0.85; transform: scale(0.98); }

.back-btn {
  background: transparent;
  border: 1px solid var(--border-focus);
  color: var(--text);
  font-size: 15px;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.2s, transform 0.1s;
}
.back-btn:active { background: var(--surface2); transform: scale(0.98); }

.back-arrow { font-size: 18px; line-height: 1; margin-top: -1px; }

/* ─── FOOTER ─── */
.page-footer {
  text-align: center;
  padding-top: 12px;
  margin-top: 40px;
}
.full-name {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.creator {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 6px;
  letter-spacing: 0.06em;
}

/* ─── RESULTS ─── */
.results-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 16px;
  margin-bottom: 14px;
}

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.result-row:last-child { border-bottom: none; padding-bottom: 0; }

.result-value {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  color: var(--accent-warm);
}

.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  background: var(--surface2);
  border: 1px solid rgba(212,169,106,0.18);
  border-radius: var(--radius-sm);
  margin-bottom: 14px;
}
.total-label {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent-warm);
}
.total-value {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--accent-warm);
  letter-spacing: -0.02em;
}

/* ─── DISTANCE BADGE ─── */
.distance-tag {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
}
.distance-tag.short {
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(74,222,128,0.2);
}
.distance-tag.long {
  background: rgba(212,169,106,0.1);
  color: var(--accent-warm);
  border: 1px solid rgba(212,169,106,0.2);
}

/* ─── ANIMATIONS ─── */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%       { transform: translateX(-6px); }
  40%       { transform: translateX(6px); }
  60%       { transform: translateX(-4px); }
  80%       { transform: translateX(4px); }
}
.shake { animation: shake 0.35s ease; }

  <script>
    const FIELD_IDS = ['reg-3pm', 'extra-3pm', 'exch-3pm', 'reg-10pm', 'extra-10pm', 'exch-10pm', 'double-days'];
    let distance = 'SHORT';

    const fields = Object.fromEntries(FIELD_IDS.map(id => [id, document.getElementById(id)]));
    const btnShort = document.getElementById('btn-short');
    const btnLong  = document.getElementById('btn-long');

    function val(id) { return parseFloat(fields[id].value) || 0; }

    function fmt(n) {
      return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function setDistance(v) {
      distance = v;
      btnShort.className = 'toggle-btn' + (v === 'SHORT' ? ' active-short' : '');
      btnLong.className  = 'toggle-btn' + (v === 'LONG'  ? ' active-long'  : '');
    }

    function submitData() {
      let valid = true;

      FIELD_IDS.forEach(id => {
        const el = fields[id];
        const n  = parseFloat(el.value);
        const bad = el.value.trim() !== '' && (isNaN(n) || n < 0 || n > 99);
        el.classList.toggle('error', bad);
        if (bad) {
          el.classList.add('shake');
          setTimeout(() => el.classList.remove('shake'), 350);
          valid = false;
        }
      });

      if (!valid) return;

      const all3  = val('reg-3pm')  + val('extra-3pm')  + val('exch-3pm');
      const all10 = val('reg-10pm') + val('extra-10pm') + val('exch-10pm');
      const doubleDays = val('double-days');

      const rSP1  = all3  * 4 * 16.65;
      const rSP2  = all10 * 8 * 25;
      const rMeal = (all3 + all10) * 950;
      const rTaxi = (all3 + all10 - doubleDays * 2) * (distance === 'SHORT' ? 950 : 2000);
      const total = rSP1 + rSP2 + rMeal + rTaxi;

      document.getElementById('r-sp1').textContent   = fmt(rSP1);
      document.getElementById('r-sp2').textContent   = fmt(rSP2);
      document.getElementById('r-meal').textContent  = fmt(rMeal);
      document.getElementById('r-taxi').textContent  = fmt(rTaxi);
      document.getElementById('r-total').textContent = fmt(total);
      document.getElementById('r-distance').innerHTML = distance === 'SHORT'
        ? '<span class="distance-tag short">Short</span>'
        : '<span class="distance-tag long">Long</span>';

      showPage('results-page');
    }

    function goBack() { showPage('input-page'); }

    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    FIELD_IDS.forEach(id => {
      fields[id].addEventListener('input', () => {
        const el = fields[id];
        el.classList.remove('error');
        if (el.value !== '') {
          if (parseFloat(el.value) > 99) el.value = 99;
          if (parseFloat(el.value) < 0)  el.value = 0;
        }
      });
    });
  </script>
