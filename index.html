  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useRef, useCallback, useEffect } = React;

      const DERIV_WS_URL = "wss://ws.binaryws.com/websockets/v3?app_id=1089";
      const PING_INTERVAL_MS = 25000;

      const SYMBOLS = [
        { value: "R_10", label: "Volatility 10", tag: "V10" },
        { value: "R_25", label: "Volatility 25", tag: "V25" },
        { value: "R_50", label: "Volatility 50", tag: "V50" },
        { value: "R_75", label: "Volatility 75", tag: "V75" },
        { value: "R_100", label: "Volatility 100", tag: "V100" },
      ];

      const STRATEGIES = [
        { value: "HYBRID", label: "Hybrid (5-Indicator + MACD Gate)", desc: "RSI · StochRSI · BB · EMA · MACD confluence. MACD crossover REQUIRED as confirmation gate. 3/5 min for auto." },
        { value: "RSI", label: "RSI + Trend + MACD Gate", desc: "RSI oversold/overbought with 50-EMA trend filter. MACD direction must align." },
        { value: "EMA", label: "EMA Crossover + ATR + MACD Gate", desc: "EMA crossover filtered by ATR spike guard and MACD histogram direction." },
        { value: "BB", label: "BB + StochRSI + MACD Gate", desc: "Bollinger Band touch + StochRSI extreme, MACD histogram confirms." },
        { value: "MACD", label: "MACD Primary + RSI Confirm", desc: "MACD crossover as primary signal, RSI level as confirmation." },
      ];

      const DURATIONS = [
        { value: 1, label: "1 min" },
        { value: 2, label: "2 min" },
        { value: 5, label: "5 min" },
        { value: 10, label: "10 min" },
        { value: 15, label: "15 min" },
      ];

      const STRAT_CONFIG = {
        R_50: {
          HYBRID: {
            rsiPeriod: 10, rsiBuy: 30, rsiSell: 70,
            stochRsiPeriod: 14, stochRsiK: 3, stochRsiBuy: 22, stochRsiSell: 78,
            bbPeriod: 20, bbTouchPct: 0.15,
            emaFast: 9, emaSlow: 21, emaTrend: 50,
            macdFast: 12, macdSlow: 26, macdSignal: 9,
            atrPeriod: 14, atrSpikeMultiplier: 2.2,
            minStrengthAuto: 78, minStrengthManual: 65,
            cooldownMs: 18000,
          },
          RSI: { period: 10, buy: 28, sell: 72, emaTrend: 50, macdFast: 12, macdSlow: 26, macdSignal: 9, minStrength: 68 },
          EMA: { fast: 8, slow: 21, atrPeriod: 14, atrSpikeMultiplier: 2.0, macdFast: 12, macdSlow: 26, macdSignal: 9, minStrength: 72 },
          BB: { period: 20, touchPct: 0.15, stochRsiPeriod: 14, stochRsiK: 3, stochRsiBuy: 25, stochRsiSell: 75, macdFast: 12, macdSlow: 26, macdSignal: 9, minStrength: 70 },
          MACD: { fast: 12, slow: 26, signal: 9, rsiPeriod: 10, rsiBuy: 50, minStrength: 72 },
        },
      };

      const GENERIC_CONFIG = {
        HYBRID: { rsiPeriod: 14, rsiBuy: 30, rsiSell: 70, stochRsiPeriod: 14, stochRsiK: 3, stochRsiBuy: 20, stochRsiSell: 80, bbPeriod: 20, bbTouchPct: 0.15, emaFast: 9, emaSlow: 21, emaTrend: 50, macdFast: 12, macdSlow: 26, macdSignal: 9, atrPeriod: 14, atrSpikeMultiplier: 2.0, minStrengthAuto: 75, minStrengthManual: 62, cooldownMs: 15000 },
        RSI: { period: 14, buy: 30, sell: 70, emaTrend: 50, macdFast: 12, macdSlow: 26, macdSignal: 9, minStrength: 65 },
        EMA: { fast: 9, slow: 21, atrPeriod: 14, atrSpikeMultiplier: 2.0, macdFast: 12, macdSlow: 26, macdSignal: 9, minStrength: 70 },
        BB: { period: 20, touchPct: 0.15, stochRsiPeriod: 14, stochRsiK: 3, stochRsiBuy: 20, stochRsiSell: 80, macdFast: 12, macdSlow: 26, macdSignal: 9, minStrength: 65 },
        MACD: { fast: 12, slow: 26, signal: 9, rsiPeriod: 14, rsiBuy: 50, minStrength: 68 },
      };

      const getCfg = (symbol, strategy) => (STRAT_CONFIG[symbol] ?? GENERIC_CONFIG)[strategy] ?? GENERIC_CONFIG[strategy];

      const toNum = (v, fallback = 0) => {
        const n = typeof v === "number" ? v : parseFloat(v);
        return Number.isFinite(n) ? n : fallback;
      };

      const calcEMA = (prices, period) => {
        if (!Array.isArray(prices) || prices.length < period || period <= 0) return null;
        const k = 2 / (period + 1);
        let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
        for (let i = period; i < prices.length; i++) ema = prices[i] * k + ema * (1 - k);
        return ema;
      };

      const calcRSI = (prices, period = 14) => {
        if (!Array.isArray(prices) || prices.length < period + 1 || period <= 0) return null;
        const slice = prices.slice(-(period + 1));
        let gain = 0;
        let loss = 0;

        for (let i = 1; i < slice.length; i++) {
          const diff = slice[i] - slice[i - 1];
          if (diff > 0) gain += diff;
          else loss += -diff;
        }

        let avgGain = gain / period;
        let avgLoss = loss / period;

        if (avgGain === 0 && avgLoss === 0) return 50;
        if (avgLoss === 0) return 100;
        if (avgGain === 0) return 0;

        const rs = avgGain / avgLoss;
        return 100 - 100 / (1 + rs);
      };

      const calcStochRSI = (prices, rsiPeriod = 14, stochPeriod = 14, kPeriod = 3) => {
        if (!Array.isArray(prices) || prices.length < rsiPeriod + stochPeriod + kPeriod + 4) return null;

        const rsiSeries = [];
        for (let i = rsiPeriod; i < prices.length; i++) {
          const r = calcRSI(prices.slice(0, i + 1), rsiPeriod);
          if (r !== null) rsiSeries.push(r);
        }

        if (rsiSeries.length < stochPeriod + kPeriod) return null;

        const stochSeries = [];
        for (let i = stochPeriod - 1; i < rsiSeries.length; i++) {
          const w = rsiSeries.slice(i - stochPeriod + 1, i + 1);
          const lo = Math.min(...w);
          const hi = Math.max(...w);
          stochSeries.push(hi === lo ? 50 : ((rsiSeries[i] - lo) / (hi - lo)) * 100);
        }

        if (stochSeries.length < kPeriod) return null;
        return stochSeries.slice(-kPeriod).reduce((a, b) => a + b, 0) / kPeriod;
      };

      const calcBB = (prices, period = 20) => {
        if (!Array.isArray(prices) || prices.length < period || period <= 0) return null;
        const slice = prices.slice(-period);
        const mean = slice.reduce((a, b) => a + b, 0) / period;
        const std = Math.sqrt(slice.map(p => (p - mean) ** 2).reduce((a, b) => a + b, 0) / period);
        return { upper: mean + 2 * std, middle: mean, lower: mean - 2 * std, std };
      };

      const calcMACD = (prices, fast = 12, slow = 26, signalPeriod = 9) => {
        if (!Array.isArray(prices) || prices.length < slow + signalPeriod + 2) return null;
        const macdSeries = [];
        for (let i = slow - 1; i < prices.length; i++) {
          const sub = prices.slice(0, i + 1);
          const ef = calcEMA(sub, fast);
          const es = calcEMA(sub, slow);
          if (ef !== null && es !== null) macdSeries.push(ef - es);
        }
        if (macdSeries.length < signalPeriod + 1) return null;
        const signalLine = calcEMA(macdSeries, signalPeriod);
        const prevSignal = calcEMA(macdSeries.slice(0, -1), signalPeriod);
        const macdLine = macdSeries[macdSeries.length - 1];
        const prevMacd = macdSeries[macdSeries.length - 2];
        return {
          macd: macdLine,
          signal: signalLine,
          prevMacd,
          prevSignal,
          histogram: macdLine - signalLine,
          crossUp: prevMacd !== null && prevSignal !== null && prevMacd < prevSignal && macdLine > signalLine,
          crossDown: prevMacd !== null && prevSignal !== null && prevMacd > prevSignal && macdLine < signalLine,
          bullish: macdLine > signalLine,
        };
      };

      const calcATR = (prices, period = 14) => {
        if (!Array.isArray(prices) || prices.length < period + 1 || period <= 0) return null;
        const slice = prices.slice(-(period + 1));
        const trs = slice.map((p, i, a) => (i === 0 ? 0 : Math.abs(p - a[i - 1]))).slice(1);
        return trs.reduce((a, b) => a + b, 0) / period;
      };

      const calcATRAvg = (prices, period = 14, lookback = 50) => {
        if (!Array.isArray(prices) || prices.length < period + lookback) return null;
        const atrs = [];
        for (let i = lookback; i >= 1; i--) {
          const a = calcATR(prices.slice(0, prices.length - i + 1), period);
          if (a !== null) atrs.push(a);
        }
        return atrs.length ? atrs.reduce((a, b) => a + b, 0) / atrs.length : null;
      };

      const macdGate = (prices, direction, cfg, requireCross = false) => {
        const m = calcMACD(prices, cfg.macdFast, cfg.macdSlow, cfg.macdSignal);
        if (!m) return { pass: false, macd: null, reason: "MACD not ready" };
        if (direction === "CALL") {
          const pass = requireCross ? m.crossUp : (m.crossUp || m.bullish);
          return { pass, macd: m, reason: pass ? (m.crossUp ? "MACD ↑ crossover" : "MACD histogram+") : "MACD bearish — blocked" };
        } else {
          const pass = requireCross ? m.crossDown : (m.crossDown || !m.bullish);
          return { pass, macd: m, reason: pass ? (m.crossDown ? "MACD ↓ crossover" : "MACD histogram−") : "MACD bullish — blocked" };
        }
      };

      const computeHybrid = (prices, symbol = "R_50", execMode = "auto", macdRequired = true) => {
        const cfg = getCfg(symbol, "HYBRID");
        if (!cfg || prices.length < 80) return null;
        const price = prices[prices.length - 1];

        const rsi = calcRSI(prices, cfg.rsiPeriod);
        const stochRsi = calcStochRSI(prices, cfg.stochRsiPeriod, cfg.stochRsiPeriod, cfg.stochRsiK);
        const bb = calcBB(prices, cfg.bbPeriod);
        const emaFast = calcEMA(prices, cfg.emaFast);
        const emaSlow = calcEMA(prices, cfg.emaSlow);
        const emaTrend = calcEMA(prices, cfg.emaTrend);
        const atr = calcATR(prices, cfg.atrPeriod);
        const atrAvg = calcATRAvg(prices, cfg.atrPeriod, 50);

        if (rsi === null || bb === null || emaFast === null || emaSlow === null || emaTrend === null) return null;

        if (atr !== null && atrAvg !== null && atr > atrAvg * cfg.atrSpikeMultiplier) {
          return { filtered: true, reason: `ATR spike (${atr.toFixed(4)} vs avg ${atrAvg.toFixed(4)})` };
        }

        const trendUp = price > emaTrend;

        let rsiVote = 0, rsiScore = 0, rsiLabel = "";
        if (rsi < cfg.rsiBuy) {
          rsiVote = 1;
          rsiScore = Math.min(100, 65 + (cfg.rsiBuy - rsi) * 3.5);
          rsiLabel = `${rsi.toFixed(1)} oversold`;
        } else if (rsi > cfg.rsiSell) {
          rsiVote = -1;
          rsiScore = Math.min(100, 65 + (rsi - cfg.rsiSell) * 3.5);
          rsiLabel = `${rsi.toFixed(1)} overbought`;
        } else {
          rsiScore = Math.max(20, 50 - Math.abs(rsi - 50) * 1.2);
          rsiLabel = `${rsi.toFixed(1)} neutral`;
        }

        let srsiVote = 0, srsiScore = 0, srsiLabel = "";
        if (stochRsi !== null) {
          if (stochRsi < cfg.stochRsiBuy) {
            srsiVote = 1;
            srsiScore = Math.min(100, 65 + (cfg.stochRsiBuy - stochRsi) * 2);
            srsiLabel = `${stochRsi.toFixed(1)} oversold`;
          } else if (stochRsi > cfg.stochRsiSell) {
            srsiVote = -1;
            srsiScore = Math.min(100, 65 + (stochRsi - cfg.stochRsiSell) * 2);
            srsiLabel = `${stochRsi.toFixed(1)} overbought`;
          } else {
            srsiScore = 30;
            srsiLabel = `${stochRsi.toFixed(1)} neutral`;
          }
        }

        const bbRange = bb.upper - bb.lower;
        const bbPos = bbRange > 0 ? (price - bb.lower) / bbRange : 0.5;
        let bbVote = 0, bbScore = 0, bbLabel = "";
        if (bbPos < cfg.bbTouchPct) {
          bbVote = 1;
          bbScore = Math.min(100, 65 + (cfg.bbTouchPct - bbPos) * 280);
          bbLabel = `${(bbPos * 100).toFixed(0)}% near lower`;
        } else if (bbPos > 1 - cfg.bbTouchPct) {
          bbVote = -1;
          bbScore = Math.min(100, 65 + (bbPos - (1 - cfg.bbTouchPct)) * 280);
          bbLabel = `${(bbPos * 100).toFixed(0)}% near upper`;
        } else {
          bbScore = 38;
          bbLabel = `${(bbPos * 100).toFixed(0)}% mid band`;
        }

        const sep = Math.abs(emaFast - emaSlow) / (Math.abs(emaSlow) * 0.001 + 1e-6);
        const emaVote = emaFast > emaSlow ? 1 : -1;
        const emaScore = Math.min(100, 58 + Math.min(sep * 20, 40));
        const emaLabel = emaFast > emaSlow ? "Fast above slow" : "Fast below slow";

        const m = calcMACD(prices, cfg.macdFast, cfg.macdSlow, cfg.macdSignal);
        let macdVote = 0, macdScore = 50, macdLabel = "—";
        if (m) {
          if (m.crossUp) {
            macdVote = 1;
            macdScore = 88;
            macdLabel = "Bullish crossover ✓";
          } else if (m.crossDown) {
            macdVote = -1;
            macdScore = 88;
            macdLabel = "Bearish crossover ✓";
          } else {
            macdVote = m.bullish ? 1 : -1;
            macdScore = 55;
            macdLabel = m.bullish ? "Histogram +" : "Histogram −";
          }
        }

        const allVotes = [rsiVote, srsiVote, bbVote, emaVote, macdVote];
        const callVotes = allVotes.filter(v => v === 1).length;
        const putVotes = allVotes.filter(v => v === -1).length;
        const minVotes = execMode === "auto" ? 3 : 2;

        if (callVotes < minVotes && putVotes < minVotes) return null;

        const direction = callVotes >= putVotes ? "CALL" : "PUT";
        const dirMult = direction === "CALL" ? 1 : -1;
        const agreeCount = direction === "CALL" ? callVotes : putVotes;
        const allAgree = agreeCount === 5;

        if (direction === "CALL" && !trendUp) return null;
        if (direction === "PUT" && trendUp) return null;

        let macdGateInfo = null;
        if (macdRequired && m) {
          const gatePass = direction === "CALL" ? (m.bullish || m.crossUp) : (!m.bullish || m.crossDown);
          if (!gatePass) return { filtered: true, reason: `MACD gate blocked (${direction}: ${m.bullish ? "histogram+" : "histogram−"})` };
          macdGateInfo = direction === "CALL"
            ? (m.crossUp ? "MACD crossover ↑ ✓" : "MACD histogram+ ✓")
            : (m.crossDown ? "MACD crossover ↓ ✓" : "MACD histogram− ✓");
        }

        const W = { rsi: 0.22, srsi: 0.22, bb: 0.18, ema: 0.20, macd: 0.18 };
        const votes = { rsi: rsiVote, srsi: srsiVote, bb: bbVote, ema: emaVote, macd: macdVote };
        const scores = { rsi: rsiScore, srsi: srsiScore, bb: bbScore, ema: emaScore, macd: macdScore };
        let wSum = 0, wTotal = 0;

        for (const key of Object.keys(W)) {
          const v = votes[key], s = scores[key], w = W[key];
          if (v === dirMult) {
            wSum += s * w;
            wTotal += w;
          } else if (v === 0) {
            wSum += s * w * 0.15;
            wTotal += w * 0.15;
          } else {
            wSum += s * w * 0.05;
            wTotal += w * 0.3;
          }
        }

        const rawStr = wTotal > 0 ? wSum / wTotal : 0;
        const bonus = allAgree ? 8 : agreeCount === 4 ? 4 : 0;
        const strength = Math.min(100, Math.round(rawStr + bonus));
        const minStr = execMode === "auto" ? cfg.minStrengthAuto : cfg.minStrengthManual;

        if (strength < minStr) return null;

        return {
          direction,
          strength,
          allAgree,
          agreeCount,
          summary: `${agreeCount}/5 indicators align · ${macdGateInfo || "MACD gate off"}`,
          trendBias: trendUp ? "Uptrend" : "Downtrend",
          macdGate: macdGateInfo,
          components: {
            rsi: { vote: rsiVote, score: Math.round(rsiScore), label: rsiLabel, agrees: rsiVote === dirMult },
            srsi: { vote: srsiVote, score: Math.round(srsiScore), label: srsiLabel, agrees: srsiVote === dirMult },
            bb: { vote: bbVote, score: Math.round(bbScore), label: bbLabel, agrees: bbVote === dirMult },
            ema: { vote: emaVote, score: Math.round(emaScore), label: emaLabel, agrees: emaVote === dirMult },
            macd: { vote: macdVote, score: Math.round(macdScore), label: macdLabel, agrees: macdVote === dirMult },
          },
        };
      };

      const computeSingle = (strategy, prices, prevPrices, symbol = "R_50", macdRequired = true) => {
        if (!Array.isArray(prices) || prices.length < 60) return null;
        const cfg = getCfg(symbol, strategy);
        if (!cfg) return null;

        if (strategy === "RSI") {
          const rsi = calcRSI(prices, cfg.period);
          const emaTrend = calcEMA(prices, cfg.emaTrend);
          if (rsi === null || emaTrend === null) return null;
          const price = prices[prices.length - 1];
          const trendUp = price > emaTrend;
          let sig = null;

          if (rsi < cfg.buy && trendUp) sig = { direction: "CALL", strength: Math.min(100, Math.round(cfg.minStrength + (cfg.buy - rsi) * 3)), summary: `RSI ${rsi.toFixed(1)} oversold + uptrend` };
          if (rsi > cfg.sell && !trendUp) sig = { direction: "PUT", strength: Math.min(100, Math.round(cfg.minStrength + (rsi - cfg.sell) * 3)), summary: `RSI ${rsi.toFixed(1)} overbought + downtrend` };
          if (!sig) return null;

          if (macdRequired) {
            const gate = macdGate(prices, sig.direction, cfg);
            if (!gate.pass) return { filtered: true, reason: gate.reason };
            sig.macdGate = gate.reason;
          }

          return { ...sig, components: null };
        }

        if (strategy === "EMA") {
          const eFast = calcEMA(prices, cfg.fast);
          const eSlow = calcEMA(prices, cfg.slow);
          const peFast = calcEMA(prevPrices, cfg.fast);
          const peSlow = calcEMA(prevPrices, cfg.slow);
          if (eFast === null || eSlow === null || peFast === null || peSlow === null) return null;

          const atr = calcATR(prices, cfg.atrPeriod);
          const atrAvg = calcATRAvg(prices, cfg.atrPeriod, 40);
          if (atr !== null && atrAvg !== null && atr > atrAvg * cfg.atrSpikeMultiplier) return null;

          let sig = null;
          if (peFast < peSlow && eFast > eSlow) sig = { direction: "CALL", strength: cfg.minStrength, summary: "EMA bullish crossover (ATR OK)" };
          if (peFast > peSlow && eFast < eSlow) sig = { direction: "PUT", strength: cfg.minStrength, summary: "EMA bearish crossover (ATR OK)" };
          if (!sig) return null;

          if (macdRequired) {
            const gate = macdGate(prices, sig.direction, cfg);
            if (!gate.pass) return { filtered: true, reason: gate.reason };
            sig.macdGate = gate.reason;
          }

          return { ...sig, components: null };
        }

        if (strategy === "BB") {
          const price = prices[prices.length - 1];
          const bb = calcBB(prices, cfg.period);
          const stochRsi = calcStochRSI(prices, cfg.stochRsiPeriod, cfg.stochRsiPeriod, cfg.stochRsiK);
          if (!bb) return null;

          const bbRange = bb.upper - bb.lower;
          const bbPos = bbRange > 0 ? (price - bb.lower) / bbRange : 0.5;
          let sig = null;

          if (bbPos <= cfg.touchPct && stochRsi !== null && stochRsi < cfg.stochRsiBuy) {
            sig = { direction: "CALL", strength: cfg.minStrength + Math.round((cfg.stochRsiBuy - stochRsi) * 0.8), summary: `Lower BB + StochRSI ${stochRsi.toFixed(1)}` };
          }
          if (bbPos >= 1 - cfg.touchPct && stochRsi !== null && stochRsi > cfg.stochRsiSell) {
            sig = { direction: "PUT", strength: cfg.minStrength + Math.round((stochRsi - cfg.stochRsiSell) * 0.8), summary: `Upper BB + StochRSI ${stochRsi.toFixed(1)}` };
          }
          if (!sig) return null;

          if (macdRequired) {
            const gate = macdGate(prices, sig.direction, cfg);
            if (!gate.pass) return { filtered: true, reason: gate.reason };
            sig.macdGate = gate.reason;
          }

          return { ...sig, components: null };
        }

        if (strategy === "MACD") {
          const m = calcMACD(prices, cfg.fast, cfg.slow, cfg.signal);
          const rsi = calcRSI(prices, cfg.rsiPeriod);
          if (!m || rsi === null) return null;

          if (m.crossUp && rsi > cfg.rsiBuy) {
            return { direction: "CALL", strength: cfg.minStrength + Math.round((rsi - cfg.rsiBuy) * 0.6), summary: `MACD ↑ cross · RSI ${rsi.toFixed(1)} ✓`, macdGate: "Primary MACD crossover", components: null };
          }
          if (m.crossDown && rsi < (100 - cfg.rsiBuy)) {
            return { direction: "PUT", strength: cfg.minStrength + Math.round(((100 - cfg.rsiBuy) - rsi) * 0.6), summary: `MACD ↓ cross · RSI ${rsi.toFixed(1)} ✓`, macdGate: "Primary MACD crossover", components: null };
          }
        }

        return null;
      };

      const getSignal = (strategy, prices, prev, symbol, execMode, macdRequired) =>
        strategy === "HYBRID"
          ? computeHybrid(prices, symbol, execMode, macdRequired)
          : computeSingle(strategy, prices, prev, symbol, macdRequired);

      const runBacktest = (prices, strategy, symbol, duration, minStr, macdRequired) => {
        const d = Math.max(1, parseInt(duration, 10) || 1);
        const TICK_LOOKAHEAD = Math.max(10, d * 4);
        const MIN_PRICES = 100;

        if (prices.length < MIN_PRICES + TICK_LOOKAHEAD) {
          return { error: `Need at least ${MIN_PRICES + TICK_LOOKAHEAD} price ticks. Have ${prices.length}.` };
        }

        const results = [];
        const cooldownTicks = 15;
        let lastSignalAt = -cooldownTicks;

        for (let i = MIN_PRICES; i < prices.length - TICK_LOOKAHEAD; i++) {
          if (i - lastSignalAt < cooldownTicks) continue;

          const slice = prices.slice(0, i + 1);
          const prev = prices.slice(0, i);
          const signal = getSignal(strategy, slice, prev, symbol, "auto", macdRequired);

          if (!signal || signal.filtered || signal.strength < minStr) continue;

          const entryPrice = prices[i];
          const exitPrice = prices[i + TICK_LOOKAHEAD];
          const priceChange = exitPrice - entryPrice;
          const won = signal.direction === "CALL" ? priceChange > 0 : priceChange < 0;

          results.push({
            index: i,
            direction: signal.direction,
            strength: signal.strength,
            entry: entryPrice,
            exit: exitPrice,
            change: priceChange,
            won,
            macdGate: signal.macdGate || "—",
            summary: signal.summary,
          });
          lastSignalAt = i;
        }

        if (results.length === 0) return { error: "No signals fired during backtest. Try lowering minStrength or switching strategy." };

        const wins = results.filter(r => r.won).length;
        const losses = results.length - wins;
        const winRate = (wins / results.length) * 100;
        const callSigs = results.filter(r => r.direction === "CALL");
        const putSigs = results.filter(r => r.direction === "PUT");
        const callWR = callSigs.length > 0 ? ((callSigs.filter(r => r.won).length / callSigs.length) * 100).toFixed(1) : "—";
        const putWR = putSigs.length > 0 ? ((putSigs.filter(r => r.won).length / putSigs.length) * 100).toFixed(1) : "—";
        const avgStrength = results.reduce((a, r) => a + r.strength, 0) / results.length;

        let maxWinStreak = 0, maxLossStreak = 0, curWin = 0, curLoss = 0;
        for (const r of results) {
          if (r.won) { curWin++; curLoss = 0; maxWinStreak = Math.max(maxWinStreak, curWin); }
          else { curLoss++; curWin = 0; maxLossStreak = Math.max(maxLossStreak, curLoss); }
        }

        const PAYOUT_RATIO = 0.85;
        const grossProfit = wins * PAYOUT_RATIO;
        const grossLoss = losses * 1;
        const profitFactor = grossLoss > 0 ? (grossProfit / grossLoss).toFixed(2) : "∞";

        const rolling = [];
        for (let i = 9; i < results.length; i++) {
          const w = results.slice(i - 9, i + 1).filter(r => r.won).length;
          rolling.push({ idx: i, wr: (w / 10) * 100 });
        }

        return {
          total: results.length,
          wins,
          losses,
          winRate: winRate.toFixed(1),
          callWR,
          putWR,
          avgStrength: avgStrength.toFixed(1),
          maxWinStreak,
          maxLossStreak,
          profitFactor,
          rolling,
          results: results.slice(0, 50),
        };
      };

      const Sparkline = ({ data, color = "#00ff88", width = 130, height = 38 }) => {
        if (!data || data.length < 2) return <svg width={width} height={height} />;
        const min = Math.min(...data);
        const max = Math.max(...data);
        const range = max - min || 1;
        const pts = data.map((v, i) => `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * height}`).join(" ");
        return (
          <svg width={width} height={height} style={{ overflow: "visible" }}>
            <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" />
          </svg>
        );
      };

      const WRSparkline = ({ data, width = 200, height = 40 }) => {
        if (!data || data.length < 2) return <svg width={width} height={height}><text x="4" y="20" fill="#2a5438" fontSize="9">Need 10+ signals</text></svg>;
        const vals = data.map(d => d.wr);
        const pts = vals.map((v, i) => `${(i / (vals.length - 1)) * width},${height - ((v / 100)) * height}`).join(" ");
        const color = vals[vals.length - 1] >= 55 ? "#00ff88" : vals[vals.length - 1] >= 45 ? "#ffaa00" : "#ff3d5f";
        return (
          <svg width={width} height={height} style={{ overflow: "visible" }}>
            <line x1="0" y1={height * 0.45} x2={width} y2={height * 0.45} stroke="#142a1c" strokeWidth="1" strokeDasharray="3,3" />
            <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round" />
          </svg>
        );
      };

      const StrengthGauge = ({ value, size = 70 }) => {
        const r = size / 2 - 7, cx = size / 2, cy = size / 2;
        const toRad = d => (d * Math.PI) / 180;
        const arcPath = (s, e) => {
          const [sx, sy] = [cx + r * Math.cos(toRad(s)), cy + r * Math.sin(toRad(s))];
          const [ex, ey] = [cx + r * Math.cos(toRad(e)), cy + r * Math.sin(toRad(e))];
          return `M ${sx} ${sy} A ${r} ${r} 0 ${e - s > 180 ? 1 : 0} 1 ${ex} ${ey}`;
        };
        const color = value >= 80 ? "#00ff88" : value >= 65 ? "#ffaa00" : "#ff3d5f";
        return (
          <svg width={size} height={size}>
            <path d={arcPath(135, 404.9)} fill="none" stroke="#162e22" strokeWidth="6" strokeLinecap="round" />
            <path d={arcPath(135, Math.min(135 + (value / 100) * 270, 404.8))} fill="none" stroke={color} strokeWidth="6" strokeLinecap="round" style={{ filter: `drop-shadow(0 0 5px ${color}90)` }} />
            <text x={cx} y={cy + 5} textAnchor="middle" fill={color} fontSize="13" fontFamily="'Syne',sans-serif" fontWeight="800">{value}%</text>
          </svg>
        );
      };

      const Pill = ({ label, score, agrees, vote }) => {
        const color = agrees ? "#00ff88" : vote === 0 ? "#5a9e78" : "#ff3d5f";
        const bg = agrees ? "rgba(0,255,136,.09)" : vote === 0 ? "rgba(90,158,120,.06)" : "rgba(255,61,95,.09)";
        const border = agrees ? "rgba(0,255,136,.3)" : vote === 0 ? "rgba(90,158,120,.2)" : "rgba(255,61,95,.3)";
        return (
          <div style={{ flex: 1, background: bg, border: `1px solid ${border}`, borderRadius: 4, padding: "7px 9px", display: "flex", flexDirection: "column", gap: 4 }}>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontSize: 8, color: "#5a9e78", letterSpacing: 1.5, textTransform: "uppercase" }}>{label}</span>
              <span style={{ fontSize: 13, color, fontWeight: 700, lineHeight: 1 }}>{vote === 1 ? "↑" : vote === -1 ? "↓" : "–"}</span>
            </div>
            <div style={{ fontSize: 12, color, fontWeight: 700 }}>{score}%</div>
            <div style={{ height: 3, background: "#162e22", borderRadius: 2 }}>
              <div style={{ height: "100%", width: `${score}%`, background: color, borderRadius: 2, transition: "width .4s" }} />
            </div>
          </div>
        );
      };

      function MarsBot() {
        const [tokenInput, setTokenInput] = useState("");
        const [connected, setConnected] = useState(false);
        const [authorized, setAuthorized] = useState(false);
        const [accountInfo, setAccountInfo] = useState(null);
        const [balance, setBalance] = useState(null);
        const [wsStatus, setWsStatus] = useState("disconnected");

        const [symbol, setSymbol] = useState("R_50");
        const [strategy, setStrategy] = useState("HYBRID");
        const [stake, setStake] = useState("1");
        const [duration, setDuration] = useState(1);
        const [maxDailyLoss, setMaxDailyLoss] = useState("5");
        const [maxTrades, setMaxTrades] = useState("20");
        const [minStrength, setMinStrength] = useState("78");
        const [martingale, setMartingale] = useState(false);
        const [martMul, setMartMul] = useState("1.8");
        const [execMode, setExecMode] = useState("auto");
        const [macdGateEnabled, setMacdGateEnabled] = useState(true);

        const [botRunning, setBotRunning] = useState(false);
        const [currentPrice, setCurrentPrice] = useState(null);
        const [priceHistory, setPriceHistory] = useState([]);
        const [liveSignal, setLiveSignal] = useState(null);
        const [pendingSignal, setPendingSignal] = useState(null);
        const [signals, setSignals] = useState([]);
        const [trades, setTrades] = useState([]);
        const [openContracts, setOpenContracts] = useState([]);
        const [dailyPnL, setDailyPnL] = useState(0);
        const [todayTrades, setTodayTrades] = useState(0);
        const [consecLosses, setConsecLosses] = useState(0);
        const [activeTab, setActiveTab] = useState("signal");
        const [logs, setLogs] = useState([]);

        const [btResult, setBtResult] = useState(null);
        const [btRunning, setBtRunning] = useState(false);

        const [wrLog, setWrLog] = useState([]);

        const socketRef = useRef(null);
        const pricesRef = useRef([]);
        const prevRef = useRef([]);
        const runningRef = useRef(false);
        const pnlRef = useRef(0);
        const tradeCountRef = useRef(0);
        const consecLossRef = useRef(0);
        const initStakeRef = useRef(1);
        const currentStakeRef = useRef(1);
        const execModeRef = useRef("auto");
        const symbolRef = useRef("R_50");
        const strategyRef = useRef("HYBRID");
        const durationRef = useRef(1);
        const minStrRef = useRef(78);
        const accountInfoRef = useRef(null);
        const martingaleRef = useRef(false);
        const martMulRef = useRef(1.8);
        const maxLossRef = useRef(10);
        const maxTradesRef = useRef(20);
        const lastSignalRef = useRef(0);
        const tickCountRef = useRef(0);
        const pingTimerRef = useRef(null);
        const lastLossDirRef = useRef(null);
        const lastLossTimeRef = useRef(0);
        const macdGateRef = useRef(true);
        const subscriptionIds = useRef({});
        const pendingDirections = useRef({});
        const handleMsgRef = useRef(null);
        const evalSignalRef = useRef(null);
        const sessionWinsRef = useRef(0);
        const sessionTotalRef = useRef(0);
        const sessionPnLRef = useRef(0);

        useEffect(() => { execModeRef.current = execMode; }, [execMode]);
        useEffect(() => { symbolRef.current = symbol; }, [symbol]);
        useEffect(() => { strategyRef.current = strategy; }, [strategy]);
        useEffect(() => { durationRef.current = Math.max(1, parseInt(duration, 10) || 1); }, [duration]);
        useEffect(() => { minStrRef.current = toNum(minStrength, 78); }, [minStrength]);
        useEffect(() => { accountInfoRef.current = accountInfo; }, [accountInfo]);
        useEffect(() => { martingaleRef.current = martingale; }, [martingale]);
        useEffect(() => { martMulRef.current = toNum(martMul, 1.8); }, [martMul]);
        useEffect(() => { maxTradesRef.current = Math.max(1, parseInt(maxTrades, 10) || 20); }, [maxTrades]);
        useEffect(() => { initStakeRef.current = Math.max(0.35, toNum(stake, 1)); }, [stake]);
        useEffect(() => { macdGateRef.current = macdGateEnabled; }, [macdGateEnabled]);
        useEffect(() => {
          const bal = accountInfoRef.current?.balance ?? 0;
          maxLossRef.current = (bal * (toNum(maxDailyLoss, 5))) / 100;
        }, [maxDailyLoss, accountInfo]);

        useEffect(() => {
          return () => {
            if (pingTimerRef.current) clearInterval(pingTimerRef.current);
            if (socketRef.current) {
              try { socketRef.current.close(); } catch (_) {}
            }
          };
        }, []);

        const addLog = useCallback((msg, type = "info") => {
          const time = new Date().toLocaleTimeString("en-GB");
          setLogs(prev => [{ time, msg, type, id: Date.now() + Math.random() }, ...prev].slice(0, 100));
        }, []);

        const placeTrade = useCallback((signal) => {
          if (!socketRef.current || socketRef.current.readyState !== WebSocket.OPEN) {
            addLog("WebSocket not ready", "error");
            return;
          }

          const tradeStake = Math.max(0.35, toNum(currentStakeRef.current, 1));
          const lockedDuration = Math.max(1, parseInt(durationRef.current, 10) || 1);

          pendingDirections.current.__next = signal.direction;

          socketRef.current.send(JSON.stringify({
            buy: 1,
            price: tradeStake,
            parameters: {
              amount: tradeStake,
              basis: "stake",
              contract_type: signal.direction,
              currency: accountInfoRef.current?.currency || "USD",
              duration: lockedDuration,
              duration_unit: "m",
              symbol: symbolRef.current,
            },
          }));

          setPendingSignal(null);
          addLog(`Placing ${signal.direction} · stake ${tradeStake.toFixed(2)} · duration ${lockedDuration}m · str ${signal.strength}% · ${signal.macdGate || "no gate"}`, "success");
        }, [addLog]);

        const dismissSignal = useCallback(() => {
          addLog("Signal dismissed", "warning");
          setPendingSignal(null);
        }, [addLog]);

        const handleMsg = (data) => {
          if (data.error) {
            addLog(`Deriv error: ${data.error.message}`, "error");
            return;
          }

          if (data.msg_type === "authorize") {
            setAuthorized(true);
            setAccountInfo(data.authorize);
            accountInfoRef.current = data.authorize;
            const pct = toNum(maxDailyLoss, 5);
            maxLossRef.current = (data.authorize.balance * pct) / 100;
            setBalance(data.authorize.balance);
            addLog(`Authorized — ${data.authorize.loginid} · ${data.authorize.currency} ${data.authorize.balance}`, "success");
            socketRef.current?.send(JSON.stringify({ balance: 1, subscribe: 1 }));
          }

          if (data.msg_type === "balance") {
            const nb = data.balance.balance;
            setBalance(nb);
            if (accountInfoRef.current) {
              accountInfoRef.current = { ...accountInfoRef.current, balance: nb };
              maxLossRef.current = (nb * toNum(maxDailyLoss, 5)) / 100;
            }
          }

          if (data.msg_type === "tick") {
            const price = parseFloat(data.tick.quote);
            setCurrentPrice(price);
            prevRef.current = [...pricesRef.current];
            pricesRef.current = [...pricesRef.current, price].slice(-400);
            tickCountRef.current += 1;
            if (tickCountRef.current % 4 === 0) setPriceHistory([...pricesRef.current.slice(-80)]);
            if (runningRef.current && pricesRef.current.length >= 80 && tickCountRef.current % 3 === 0 && evalSignalRef.current) {
              evalSignalRef.current(price);
            }
          }

          if (data.msg_type === "buy") {
            const contractId = data.buy.contract_id;
            const direction = pendingDirections.current.__next || "CALL";
            delete pendingDirections.current.__next;
            pendingDirections.current[contractId] = direction;
            tradeCountRef.current += 1;
            setTodayTrades(p => p + 1);
            addLog(`Contract #${contractId} opened · stake ${data.buy.buy_price}`, "success");
            setOpenContracts(p => [...p, { id: contractId, buyPrice: data.buy.buy_price, openTime: new Date().toLocaleTimeString(), symbol: symbolRef.current, direction }]);
            socketRef.current?.send(JSON.stringify({ proposal_open_contract: 1, contract_id: contractId, subscribe: 1 }));
          }

          if (data.msg_type === "proposal_open_contract") {
            const contract = data.proposal_open_contract;
            if (data.subscription && !subscriptionIds.current[contract.contract_id]) {
              subscriptionIds.current[contract.contract_id] = data.subscription.id;
            }
            if (!contract.is_sold) return;

            const contractId = contract.contract_id;
            const direction = pendingDirections.current[contractId] || (contract.contract_type?.includes("CALL") ? "CALL" : "PUT");
            delete pendingDirections.current[contractId];

            const subId = subscriptionIds.current[contractId];
            if (subId) {
              socketRef.current?.send(JSON.stringify({ forget: subId }));
              delete subscriptionIds.current[contractId];
            }

            const profit = parseFloat(contract.profit);
            pnlRef.current += profit;
            setDailyPnL(p => p + profit);
            setOpenContracts(p => p.filter(c => c.id !== contractId));

            sessionTotalRef.current += 1;
            sessionPnLRef.current += profit;

            if (profit > 0) {
              sessionWinsRef.current += 1;
              consecLossRef.current = 0;
              setConsecLosses(0);
              currentStakeRef.current = initStakeRef.current;
              lastLossDirRef.current = null;
              addLog(`✓ WON +${profit.toFixed(2)} · WR ${((sessionWinsRef.current / sessionTotalRef.current) * 100).toFixed(1)}%`, "success");
            } else {
              consecLossRef.current += 1;
              setConsecLosses(consecLossRef.current);
              lastLossDirRef.current = direction;
              lastLossTimeRef.current = Date.now();

              if (martingaleRef.current) {
                const next = Math.min(currentStakeRef.current * martMulRef.current, (accountInfoRef.current?.balance ?? 100) * 0.04);
                currentStakeRef.current = next;
                addLog(`✗ LOST ${profit.toFixed(2)} · Martingale→${next.toFixed(2)} · WR ${((sessionWinsRef.current / sessionTotalRef.current) * 100).toFixed(1)}%`, "warning");
              } else {
                addLog(`✗ LOST ${profit.toFixed(2)} · WR ${((sessionWinsRef.current / sessionTotalRef.current) * 100).toFixed(1)}%`, "error");
              }
            }

            if (sessionTotalRef.current % 5 === 0) {
              const wr = ((sessionWinsRef.current / sessionTotalRef.current) * 100).toFixed(1);
              setWrLog(p => [...p, { time: new Date().toLocaleTimeString("en-GB"), total: sessionTotalRef.current, wins: sessionWinsRef.current, wr, pnl: sessionPnLRef.current.toFixed(2) }].slice(-100));
            }

            setTrades(p => [{
              id: contractId,
              time: new Date().toLocaleTimeString(),
              symbol: symbolRef.current,
              direction,
              stake: parseFloat(contract.buy_price),
              profit,
              won: profit > 0,
              payout: parseFloat(contract.sell_price || 0),
            }, ...p].slice(0, 50));
          }
        };

        const evalSignal = (price) => {
          if (pnlRef.current <= -maxLossRef.current) {
            addLog("⚠ Daily loss limit hit — stopping", "warning");
            setBotRunning(false);
            runningRef.current = false;
            return;
          }

          if (tradeCountRef.current >= maxTradesRef.current) {
            addLog("⚠ Max trades reached — stopping", "warning");
            setBotRunning(false);
            runningRef.current = false;
            return;
          }

          if (consecLossRef.current >= 4) {
            addLog("⚠ 4 consecutive losses — 60s cooldown", "warning");
            consecLossRef.current = 0;
            setConsecLosses(0);
            runningRef.current = false;
            setTimeout(() => {
              if (socketRef.current?.readyState === WebSocket.OPEN) {
                runningRef.current = true;
                addLog("▶ Resuming after cooldown", "info");
              }
            }, 60000);
            return;
          }

          const prices = pricesRef.current;
          const prev = prevRef.current.length > 1 ? prevRef.current : prices.slice(0, -1);
          const signal = getSignal(strategyRef.current, prices, prev, symbolRef.current, execModeRef.current, macdGateRef.current);

          if (signal && signal.filtered) {
            setLiveSignal(null);
            if (signal.reason?.includes("MACD gate")) addLog(`MACD gate blocked: ${signal.reason}`, "warning");
            return;
          }

          setLiveSignal(signal);
          if (!signal || signal.strength < minStrRef.current) return;

          const now = Date.now();
          const cfg = getCfg(symbolRef.current, "HYBRID");
          if (now - lastSignalRef.current < (cfg?.cooldownMs || 15000)) return;

          if (lastLossDirRef.current && (now - lastLossTimeRef.current) < 30000 && signal.direction === lastLossDirRef.current) {
            addLog(`⚠ Skipping ${signal.direction} — same dir as last loss`, "warning");
            return;
          }

          lastSignalRef.current = now;
          const entry = { id: now, time: new Date().toLocaleTimeString(), ...signal, price: price.toFixed(5), acted: execModeRef.current === "auto" };
          setSignals(p => [entry, ...p].slice(0, 30));
          addLog(`Signal: ${signal.direction} · ${signal.strength}% · ${signal.summary}`, "signal");

          if (execModeRef.current === "auto") placeTrade(signal);
          else setPendingSignal(entry);
        };

        handleMsgRef.current = handleMsg;
        evalSignalRef.current = evalSignal;

        const connect = useCallback(() => {
          if (socketRef.current) socketRef.current.close();
          if (pingTimerRef.current) clearInterval(pingTimerRef.current);

          setWsStatus("connecting");
          addLog("Connecting to Deriv…", "info");

          const socket = new WebSocket(DERIV_WS_URL);
          socketRef.current = socket;

          socket.onopen = () => {
            setConnected(true);
            setWsStatus("connected");
            addLog("Connected", "success");
            pingTimerRef.current = setInterval(() => {
              if (socket.readyState === WebSocket.OPEN) socket.send(JSON.stringify({ ping: 1 }));
            }, PING_INTERVAL_MS);
          };

          socket.onclose = () => {
            setConnected(false);
            setAuthorized(false);
            setWsStatus("disconnected");
            setBotRunning(false);
            runningRef.current = false;
            if (pingTimerRef.current) {
              clearInterval(pingTimerRef.current);
              pingTimerRef.current = null;
            }
            addLog("Disconnected", "warning");
          };

          socket.onerror = () => {
            setWsStatus("error");
            addLog("Connection error", "error");
          };

          socket.onmessage = (e) => {
            try {
              const d = JSON.parse(e.data);
              if (d.msg_type === "ping") return;
              handleMsgRef.current?.(d);
            } catch (err) {
              addLog("Malformed websocket message", "error");
            }
          };
        }, [addLog]);

        const authorize = () => {
          if (!tokenInput.trim()) {
            addLog("Enter a token first", "error");
            return;
          }
          if (!socketRef.current || socketRef.current.readyState !== WebSocket.OPEN) {
            addLog("Connect first", "error");
            return;
          }
          socketRef.current.send(JSON.stringify({ authorize: tokenInput }));
          addLog("Authorizing…", "info");
        };

        const startBot = () => {
          if (!authorized) {
            addLog("Authorize first", "error");
            return;
          }

          pricesRef.current = [];
          prevRef.current = [];
          tickCountRef.current = 0;
          currentStakeRef.current = initStakeRef.current;
          sessionWinsRef.current = 0;
          sessionTotalRef.current = 0;
          sessionPnLRef.current = 0;
          lastSignalRef.current = 0;
          lastLossDirRef.current = null;
          lastLossTimeRef.current = 0;
          setBotRunning(true);
          runningRef.current = true;

          socketRef.current?.send(JSON.stringify({ forget_all: "ticks" }));
          socketRef.current?.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));
          addLog(`▶ Started · ${STRATEGIES.find(s => s.value === strategy)?.label} · ${symbol} · Duration locked: ${durationRef.current}m · MACD Gate: ${macdGateEnabled ? "ON" : "OFF"}`, "success");
          addLog(`Warming up… needs 80 ticks before signalling`, "info");
        };

        const stopBot = () => {
          setBotRunning(false);
          runningRef.current = false;
          socketRef.current?.send(JSON.stringify({ forget_all: "ticks" }));
          setPendingSignal(null);
          setLiveSignal(null);

          if (sessionTotalRef.current > 0) {
            const wr = ((sessionWinsRef.current / sessionTotalRef.current) * 100).toFixed(1);
            setWrLog(p => [...p, { time: new Date().toLocaleTimeString("en-GB"), total: sessionTotalRef.current, wins: sessionWinsRef.current, wr, pnl: sessionPnLRef.current.toFixed(2), isFinal: true }].slice(-100));
          }
          addLog("■ Bot stopped", "warning");
        };

        const resetDay = () => {
          pnlRef.current = 0;
          tradeCountRef.current = 0;
          consecLossRef.current = 0;
          lastLossDirRef.current = null;
          currentStakeRef.current = initStakeRef.current;
          sessionWinsRef.current = 0;
          sessionTotalRef.current = 0;
          sessionPnLRef.current = 0;
          setDailyPnL(0);
          setTodayTrades(0);
          setConsecLosses(0);
          setWrLog([]);
          addLog("Daily stats reset", "info");
        };

        const runBt = () => {
          if (pricesRef.current.length < 120) {
            addLog("Backtest needs ≥120 collected prices. Keep bot running to gather data.", "warning");
            return;
          }
          setBtRunning(true);
          setTimeout(() => {
            const result = runBacktest(pricesRef.current, strategyRef.current, symbolRef.current, durationRef.current, toNum(minStrength, 78), macdGateRef.current);
            setBtResult(result);
            setBtRunning(false);
            if (result.error) addLog(`Backtest: ${result.error}`, "warning");
            else addLog(`Backtest complete · ${result.total} signals · WR ${result.winRate}% · PF ${result.profitFactor}`, "success");
          }, 50);
        };

        const symInfo = SYMBOLS.find(s => s.value === symbol);
        const winRate = trades.length > 0 ? ((trades.filter(t => t.won).length / trades.length) * 100).toFixed(1) : null;
        const totalPnL = trades.reduce((a, t) => a + t.profit, 0);
        const lossRatio = maxLossRef.current > 0 ? Math.min(100, (Math.abs(Math.min(0, dailyPnL)) / maxLossRef.current) * 100) : 0;
        const tradeRatio = parseInt(maxTrades, 10) > 0 ? Math.min(100, (todayTrades / parseInt(maxTrades, 10)) * 100) : 0;
        const riskColor = lossRatio > 75 ? "#ff3d5f" : lossRatio > 50 ? "#ffaa00" : "#00ff88";
        const strColor = s => s >= 80 ? "#00ff88" : s >= 65 ? "#ffaa00" : "#ff3d5f";

        const liveRollingWR = (() => {
          if (trades.length < 2) return [];
          const ordered = [...trades].reverse();
          const res = [];
          for (let i = 0; i < ordered.length; i++) {
            const window = ordered.slice(Math.max(0, i - 9), i + 1);

                    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                        <div className="sb">
                          <div className={`sbi ${botRunning ? "on" : ""}`} />
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 8, color: "#4d9968", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 4 }}>Live Price — {symInfo?.tag} · {pricesRef.current.length} ticks</div>
                            <Sparkline data={priceHistory.slice(-60)} />
                          </div>
                          <div style={{ fontSize: 11, color: "#00ccff", fontFamily: "Syne", fontWeight: 700 }}>{currentPrice ? currentPrice.toFixed(4) : "—"}</div>
                        </div>
                      </div>

                      {liveSignal && (
                        <div className="sh">
                          <div className={`sm ${liveSignal.direction === "CALL" ? "sc2" : "sp"}`}>
                            <div style={{ fontSize: 8, color: "#4d9968", letterSpacing: 1.5, textTransform: "uppercase" }}>Live Signal</div>
                            <div className={`sd ${liveSignal.direction === "CALL" ? "cg2" : "cr2"}`}>{liveSignal.direction}</div>
                            <div className="ss2">{liveSignal.summary}</div>
                            {liveSignal.trendBias && <div style={{ fontSize: 8, color: "#4d9968" }}>Trend: {liveSignal.trendBias}</div>}
                            {liveSignal.macdGate && <div style={{ fontSize: 8, color: "#00ff88" }}>✓ {liveSignal.macdGate}</div>}
                            {liveSignal.agreeCount && <div style={{ fontSize: 8, color: "#ffaa00" }}>{liveSignal.agreeCount}/5 agree</div>}
                          </div>
                          <div className="gc">
                            <div className="gl">Strength</div>
                            <StrengthGauge value={liveSignal.strength} size={80} />
                          </div>
                        </div>
                      )}

                      {liveSignal?.components && (
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                          {Object.entries(liveSignal.components).map(([key, c]) => (
                            <Pill key={key} label={key.toUpperCase()} score={c.score} agrees={c.agrees} vote={c.vote} />
                          ))}
                        </div>
                      )}

                      <div>
                        <div className="ct">Recent Signals</div>
                        {signals.length === 0
                          ? <div style={{ color: "#2a5438", fontSize: 10 }}>No signals yet. Bot needs 80 ticks to warm up. {pricesRef.current.length < 80 ? `(${pricesRef.current.length}/80 collected)` : ""}</div>
                          : signals.slice(0, 10).map(s => (
                            <div key={s.id} className="shr">
                              <span className={`db ${s.direction === "CALL" ? "dc" : "dp"}`}>{s.direction}</span>
                              <span style={{ fontSize: 9, color: strColor(s.strength), fontWeight: 700 }}>{s.strength}%</span>
                              <span style={{ fontSize: 8.5, color: "#4d9968", flex: 1 }}>{s.summary}</span>
                              {s.macdGate && <span style={{ fontSize: 7.5, color: "#00ff88" }}>MACD✓</span>}
                              <span style={{ fontSize: 8, color: "#2a5438" }}>{s.time}</span>
                              {s.acted && <span style={{ fontSize: 7.5, color: "#00ff88" }}>AUTO</span>}
                            </div>
                          ))
                        }
                      </div>
                    </div>
                  )}

                  {activeTab === "backtest" && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                      <div style={{ fontSize: 9, color: "#4d9968", lineHeight: 1.7 }}>
                        Replays your collected price history through the signal engine. Simulates trade outcomes by checking if price moved in signal direction after {Math.max(1, durationRef.current)} min (~{Math.max(10, Math.max(1, durationRef.current) * 4)} ticks). MACD gate is <strong style={{ color: macdGateEnabled ? "#00ff88" : "#ffaa00" }}>{macdGateEnabled ? "ON" : "OFF"}</strong>.<br />
                        Collect at least 120+ ticks before running (currently: <strong style={{ color: "#b0f0cc" }}>{pricesRef.current.length}</strong>).
                      </div>
                      <button className="btn bbt" onClick={runBt} disabled={btRunning || pricesRef.current.length < 120}>
                        {btRunning ? "⟳ Running backtest…" : `⊞ Run Backtest on ${pricesRef.current.length} ticks`}
                      </button>

                      {btResult && !btResult.error && (
                        <div className="btcard">
                          <div className="btgrid">
                            {[
                              { label: "Total Signals", val: btResult.total, color: "#00ccff" },
                              { label: "Win Rate", val: `${btResult.winRate}%`, color: parseFloat(btResult.winRate) >= 55 ? "#00ff88" : parseFloat(btResult.winRate) >= 45 ? "#ffaa00" : "#ff3d5f" },
                              { label: "Profit Factor", val: btResult.profitFactor, color: parseFloat(btResult.profitFactor) >= 1.0 ? "#00ff88" : "#ff3d5f" },
                              { label: "Wins", val: btResult.wins, color: "#00ff88" },
                              { label: "Losses", val: btResult.losses, color: "#ff3d5f" },
                              { label: "Avg Strength", val: `${btResult.avgStrength}%`, color: "#ffaa00" },
                              { label: "CALL Win Rate", val: `${btResult.callWR}%`, color: "#00ff88" },
                              { label: "PUT Win Rate", val: `${btResult.putWR}%`, color: "#ff3d5f" },
                              { label: "Max Loss Streak", val: btResult.maxLossStreak, color: btResult.maxLossStreak >= 4 ? "#ff3d5f" : "#ffaa00" },
                            ].map(({ label, val, color }) => (
                              <div key={label} className="btstat">
                                <div className="btsl">{label}</div>
                                <div className="btsv" style={{ color }}>{val}</div>
                              </div>
                            ))}
                          </div>

                          <div style={{ background: btResult.rolling.length > 0 ? "var(--bg3)" : "transparent", border: "1px solid var(--bd)", borderRadius: 4, padding: 10 }}>
                            <div style={{ fontSize: 8, color: "#4d9968", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8 }}>Rolling 10-Signal Win Rate</div>
                            <WRSparkline data={btResult.rolling} width={320} height={50} />
                            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
                              <span style={{ fontSize: 8, color: "#2a5438" }}>0%</span>
                              <span style={{ fontSize: 8, color: "#2a5438" }}>50% target</span>
                              <span style={{ fontSize: 8, color: "#2a5438" }}>100%</span>
                            </div>
                          </div>

                          <div>
                            <div className="ct">Signal Log (last 20)</div>
                            {btResult.results.slice(0, 20).map((r, i) => (
                              <div key={i} className="ir">
                                <span className={`db ${r.direction === "CALL" ? "dc" : "dp"}`}>{r.direction}</span>
                                <span style={{ fontSize: 8, color: strColor(r.strength), fontWeight: 700 }}>{r.strength}%</span>
                                <span style={{ fontSize: 7.5, color: "#4d9968", flex: 1 }}>{r.macdGate}</span>
                                <span style={{ fontSize: 8, color: "#2a5438" }}>Δ{r.change > 0 ? "+" : ""}{r.change.toFixed(4)}</span>
                                <span style={{ fontSize: 8, fontWeight: 700, color: r.won ? "#00ff88" : "#ff3d5f" }}>{r.won ? "WIN" : "LOSS"}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {btResult && btResult.error && (
                        <div style={{ color: "#ff3d5f", fontSize: 10, padding: "10px", background: "rgba(255,61,95,.07)", border: "1px solid rgba(255,61,95,.2)", borderRadius: 4 }}>⚠ {btResult.error}</div>
                      )}

                      {!btResult && (
                        <div style={{ color: "#2a5438", fontSize: 10 }}>No backtest run yet. Collect price data by connecting and starting the bot (no trades placed during collection).</div>
                      )}
                    </div>
                  )}

                  {activeTab === "wrlog" && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                      <div style={{ fontSize: 8.5, color: "#4d9968", lineHeight: 1.6 }}>
                        Per-session win rate snapshots logged every 5 trades and on bot stop. Rolling chart shows live session WR trend.
                      </div>

                      {liveRollingWR.length >= 2 && (
                        <div style={{ background: "var(--bg3)", border: "1px solid var(--bd)", borderRadius: 4, padding: 10 }}>
                          <div style={{ fontSize: 8, color: "#4d9968", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8 }}>Live Rolling 10-Trade WR</div>
                          <WRSparkline data={liveRollingWR} width={300} height={45} />
                          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
                            <span style={{ fontSize: 8, color: "#2a5438" }}>Session start</span>
                            <span style={{ fontSize: 8, color: "#2a5438" }}>Now</span>
                          </div>
                        </div>
                      )}

                      {trades.length > 0 && (
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                          {[
                            { label: "Session WR", val: `${winRate !== null ? winRate : "—"}%`, color: winRate !== null && parseFloat(winRate) >= 55 ? "#00ff88" : winRate !== null && parseFloat(winRate) >= 45 ? "#ffaa00" : "#ff3d5f" },
                            { label: "Session P&L", val: `${totalPnL >= 0 ? "+" : ""}${totalPnL.toFixed(2)}`, color: totalPnL >= 0 ? "#00ff88" : "#ff3d5f" },
                            { label: "Trades", val: trades.length, color: "#00ccff" },
                          ].map(({ label, val, color }) => (
                            <div key={label} className="btstat">
                              <div className="btsl">{label}</div>
                              <div className="btsv" style={{ color }}>{val}</div>
                            </div>
                          ))}
                        </div>
                      )}

                      <div>
                        <div className="ct">Win Rate Log Snapshots</div>
                        {wrLog.length === 0
                          ? <div style={{ color: "#2a5438", fontSize: 10 }}>No snapshots yet. Logged every 5 trades and on bot stop.</div>
                          : [...wrLog].reverse().map((e, i) => (
                            <div key={i} className="ir">
                              <span style={{ fontSize: 8, color: "#2a5438", flexShrink: 0 }}>{e.time}</span>
                              <span style={{ fontSize: 9, fontWeight: 700, color: parseFloat(e.wr) >= 55 ? "#00ff88" : parseFloat(e.wr) >= 45 ? "#ffaa00" : "#ff3d5f" }}>{e.wr}%</span>
                              <span style={{ fontSize: 8.5, color: "#4d9968", flex: 1 }}>{e.wins}W / {e.total - e.wins}L of {e.total}</span>
                              <span style={{ fontSize: 8.5, fontWeight: 700, color: parseFloat(e.pnl) >= 0 ? "#00ff88" : "#ff3d5f" }}>{parseFloat(e.pnl) >= 0 ? "+" : ""}{e.pnl}</span>
                              {e.isFinal && <span style={{ fontSize: 7.5, background: "rgba(255,170,0,.15)", color: "#ffaa00", padding: "1px 5px", borderRadius: 2 }}>FINAL</span>}
                            </div>
                          ))
                        }
                      </div>
                    </div>
                  )}

                  {activeTab === "trades" && (
                    <div>
                      {trades.length === 0
                        ? <div style={{ color: "#2a5438", fontSize: 10 }}>No trades yet.</div>
                        : trades.map(t => (
                          <div key={t.id} className="ir">
                            <span className={`db ${t.direction === "CALL" ? "dc" : "dp"}`}>{t.direction}</span>
                            <span style={{ fontSize: 8.5, color: "#4d9968", flex: 1 }}>{t.symbol} · {t.time}</span>
                            <span style={{ fontSize: 9, fontWeight: 700, color: t.won ? "#00ff88" : "#ff3d5f" }}>{t.won ? "+" : ""}{t.profit.toFixed(2)}</span>
                            <span style={{ fontSize: 7.5, color: t.won ? "#00ff88" : "#ff3d5f" }}>{t.won ? "WIN" : "LOSS"}</span>
                          </div>
                        ))
                      }
                    </div>
                  )}

                  {activeTab === "open" && (
                    <div>
                      {openContracts.length === 0
                        ? <div style={{ color: "#2a5438", fontSize: 10 }}>No open contracts.</div>
                        : openContracts.map(c => (
                          <div key={c.id} className="ir">
                            <span className={`db ${c.direction === "CALL" ? "dc" : "dp"}`}>{c.direction}</span>
                            <span style={{ fontSize: 8.5, color: "#4d9968", flex: 1 }}>#{c.id} · {c.symbol}</span>
                            <span style={{ fontSize: 9, color: "#00ccff" }}>Stake {c.buyPrice}</span>
                            <span style={{ fontSize: 7.5, color: "#2a5438" }}>{c.openTime}</span>
                          </div>
                        ))
                      }
                    </div>
                  )}

                  {activeTab === "logs" && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                      {logs.length === 0
                        ? <div style={{ color: "#2a5438", fontSize: 10 }}>No logs yet.</div>
                        : logs.map(l => (
                          <div key={l.id} style={{ display: "flex", alignItems: "baseline", gap: 7 }}>
                            <span style={{ fontSize: 8, color: "#2a5438", flexShrink: 0 }}>{l.time}</span>
                            <span className={`lc l${l.type === "signal" ? "sg" : l.type.charAt(0)}`}>{l.type.toUpperCase()}</span>
                            <span style={{ fontSize: 9, color: "#b0f0cc" }}>{l.msg}</span>
                          </div>
                        ))
                      }
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<MarsBot />);
    </script>
  </body>
</html>
